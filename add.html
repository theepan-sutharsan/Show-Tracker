<html lang="en">
  <head>

      crossorigin="anonymous"
    />
  </head>
  <body>
    <header class="sticky-top shadow">
      <!-- navbar -->
      <nav class="navbar p-0 navbar-expand navbar-light bg-light">
        <a class="navbar-brand bg-warning p-2" href="/index.html"
          >Show<span class="fw-bold">Tracker</span></a
        >
        <div class="container-fluid p-0">
          <ul class="navbar-nav">
            <li class="nav-item">
              <a class="nav-link p-2" href="/index.html">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="/add.html">Add</a>
            </li>
          </ul>

          <ul class="navbar-nav pe-1">
            <li class="nav-item">
              <a class="nav-link" href="/login.html">Login</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/signup.html">Sign up</a>
            </li>
          </ul>
        </div>
      </nav>
    </header>
    <main>
      <div class="container mt-4">
        <div class="card shadow">
          <div class="card-header">
            <h6 class="card-title mt-2">ADD TV SHOW</h6>
          </div>
          <div class="card-body">
            <div class="form-group">
              <label class="form-label fw-semibold" for="showName">Name</label>
              <input
                type="text"
                class="form-control mb-2"
                name="showName"
                id="showName"
                placeholder="Enter TV show name"
              />
            </div>
            <div class="py-1" id="status">
              <p></p>
            </div>
          </div>

          <div class="card-footer">
            <div class="form-group">
              <button
                type="button"
                class="btn btn-primary text-white"
                onclick="AddShow()"
              >
                Add
              </button>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script src="/js/add.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
